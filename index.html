<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
    }

    .error {
      color: #ef4444;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Asset Scanner</h1>

  <input id="assetInput" placeholder="Enter URL (https://example.com)" />
  <button id="scanBtn">Scan</button>

  <div id="error" class="error"></div>
  <div id="results"></div>

  <script>
    // -------------------------
    // Scanner Logic (separated)
    // -------------------------
    const Scanner = {
      async scan(asset) {
        // simulate async scan
        await new Promise(r => setTimeout(r, 800));

        return {
          asset,
          status: "reachable",
          timestamp: new Date().toLocaleString()
        };
      }
    };

    // -------------------------
    // App Controller
    // -------------------------
    const App = {
      state: {
        assets: []
      },

      init() {
        this.load();
        this.cacheDOM();
        this.bindEvents();
        this.render();
      },

      cacheDOM() {
        this.input = document.getElementById("assetInput");
        this.button = document.getElementById("scanBtn");
        this.results = document.getElementById("results");
        this.error = document.getElementById("error");
      },

      bindEvents() {
        this.button.addEventListener("click", () => this.handleScan());
      },

      async handleScan() {
        const value = this.input.value.trim();

        this.clearError();

        if (!this.isValidURL(value)) {
          this.showError("Invalid URL");
          return;
        }

        this.setLoading(true);

        try {
          const result = await Scanner.scan(value);
          this.state.assets.push(result);
          this.save();
          this.render();
          this.input.value = "";
        } catch (err) {
          this.showError("Scan failed");
        }

        this.setLoading(false);
      },

      render() {
        this.results.innerHTML = "";

        this.state.assets.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";

          const title = document.createElement("div");
          title.textContent = "Asset: " + item.asset;

          const status = document.createElement("div");
          status.textContent = "Status: " + item.status;

          const time = document.createElement("div");
          time.textContent = "Scanned: " + item.timestamp;

          card.appendChild(title);
          card.appendChild(status);
          card.appendChild(time);

          this.results.appendChild(card);
        });
      },

      save() {
        localStorage.setItem("assets", JSON.stringify(this.state.assets));
      },

      load() {
        this.state.assets = JSON.parse(localStorage.getItem("assets")) || [];
      },

      setLoading(isLoading) {
        this.button.disabled = isLoading;
        this.button.textContent = isLoading ? "Scanning..." : "Scan";
      },

      showError(msg) {
        this.error.textContent = msg;
      },

      clearError() {
        this.error.textContent = "";
      },

      isValidURL(str) {
        try {
          new URL(str);
          return true;
        } catch {
          return false;
        }
      }
    };

    // Start app
    App.init();
  </script>

</body>
</html>
